<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin Avigar PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 p-4 md:p-10">

    <div class="max-w-2xl mx-auto bg-zinc-900 p-8 rounded-2xl border border-zinc-800 shadow-xl">
        <h2 class="text-2xl font-bold mb-6 text-white text-center">📦 Panel de Admin Avigar</h2>
        
        <!-- Selector de Usuario -->
        <div class="mb-6 p-4 bg-zinc-950 border border-zinc-800 rounded-xl">
            <label class="block text-sm font-bold text-indigo-400 mb-2">¿Quién está subiendo el producto?</label>
            <select id="usuarioAdmin" onchange="actualizarSugerencia()" class="w-full bg-zinc-900 border border-zinc-700 p-3 rounded-xl focus:border-indigo-500 outline-none text-white cursor-pointer">
                <option value="0">Aarón (Serie 0000)</option>
                <option value="1">Elías (Serie 1000)</option>
                <option value="2">Simao (Serie 2000)</option>
            </select>
        </div>

        <!-- Sugerencia de código -->
        <div class="bg-indigo-900/20 p-3 rounded-lg mb-6 border border-indigo-500/30 text-center flex items-center justify-between px-6">
            <p class="text-xs text-indigo-300">Siguiente código para esta serie:</p>
            <span id="labelUltimo" class="text-xl font-mono font-bold text-indigo-400">---</span>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Campos de texto -->
            <div>
                <label class="block text-xs text-zinc-400 mb-1">Código</label>
                <input type="text" id="codigo" class="w-full bg-zinc-950 border border-zinc-800 p-3 rounded-xl focus:border-indigo-500 outline-none text-lg font-bold text-center">
            </div>
            <div>
                <label class="block text-xs text-zinc-400 mb-1">Nombre (Ej: chamarra reversible...)</label>
                <input type="text" id="nombre" class="w-full bg-zinc-950 border border-zinc-800 p-3 rounded-xl focus:border-indigo-500 outline-none lowercase">
            </div>
            <div>
                <label class="block text-xs text-zinc-400 mb-1">Marca (Ej: chrome-hearts)</label>
                <input type="text" id="marca" class="w-full bg-zinc-950 border border-zinc-800 p-3 rounded-xl focus:border-indigo-500 outline-none lowercase">
            </div>
            <div>
                <label class="block text-xs text-zinc-400 mb-1">Categorías (Ej: chamarras, mezclilla)</label>
                <input type="text" id="categoria" class="w-full bg-zinc-950 border border-zinc-800 p-3 rounded-xl focus:border-indigo-500 outline-none lowercase">
            </div>
            
            <!-- CALCULADORA DE COSTOS KAKOBUY -->
            <div class="md:col-span-2 bg-emerald-900/20 border border-emerald-500/30 rounded-xl p-4 my-2">
                <h3 class="text-emerald-400 font-bold mb-3 text-sm">🧮 Calculadora de Costo Real (Kakobuy a 17.5 MXN)</h3>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-xs text-emerald-200/70 mb-1">Costo Pieza (USD)</label>
                        <input type="number" id="calcUsd" oninput="calcularCostos()" placeholder="Ej: 20" class="w-full bg-zinc-950 border border-emerald-900 p-2 rounded-lg focus:border-emerald-500 outline-none text-emerald-100">
                    </div>
                    <div>
                        <label class="block text-xs text-emerald-200/70 mb-1">Peso (Gramos)</label>
                        <input type="number" id="calcGramos" oninput="calcularCostos()" placeholder="Ej: 500" class="w-full bg-zinc-950 border border-emerald-900 p-2 rounded-lg focus:border-emerald-500 outline-none text-emerald-100">
                    </div>
                </div>
                <!-- Resultados del cálculo -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-2 text-xs bg-zinc-950/50 p-3 rounded-lg border border-emerald-900/50">
                    <div class="text-center">
                        <span class="block text-zinc-500">Envío (USD)</span>
                        <span id="resEnvio" class="font-mono text-zinc-300">---</span>
                    </div>
                    <div class="text-center">
                        <span class="block text-zinc-500">Ensayo (USD)</span>
                        <span id="resEnsayo" class="font-mono text-zinc-300">---</span>
                    </div>
                    <div class="text-center">
                        <span class="block text-zinc-500">Total + 4%</span>
                        <span id="resTotalUsd" class="font-mono text-emerald-400">---</span>
                    </div>
                    <div class="text-center bg-emerald-500/10 rounded">
                        <span class="block text-emerald-500 font-bold">COSTO NETO</span>
                        <span id="resMxn" class="font-mono text-emerald-400 font-bold text-sm">---</span>
                    </div>
                </div>
            </div>

            <!-- Precios de Venta -->
            <div>
                <label class="block text-xs text-zinc-400 mb-1">Precio Menudeo (Venta)</label>
                <input type="number" id="pMenudeo" class="w-full bg-zinc-950 border border-zinc-800 p-3 rounded-xl focus:border-indigo-500 outline-none">
            </div>
            <div>
                <label class="block text-xs text-zinc-400 mb-1">Precio Mayoreo (Venta)</label>
                <input type="number" id="pMayoreo" class="w-full bg-zinc-950 border border-zinc-800 p-3 rounded-xl focus:border-indigo-500 outline-none">
            </div>
            <div>
                <label class="block text-xs text-zinc-400 mb-1">Precio Distribuidor (Venta)</label>
                <input type="number" id="pDist" class="w-full bg-zinc-950 border border-zinc-800 p-3 rounded-xl focus:border-indigo-500 outline-none">
            </div>

            <!-- Tallas (con botones rápidos) -->
            <div class="md:col-span-2">
                <label class="block text-xs text-zinc-400 mb-1">Tallas</label>
                <div class="flex gap-2 mb-2">
                    <button onclick="add('tallas', 's')" class="bg-zinc-800 px-3 py-1 rounded text-xs hover:bg-zinc-700">S</button>
                    <button onclick="add('tallas', 'm')" class="bg-zinc-800 px-3 py-1 rounded text-xs hover:bg-zinc-700">M</button>
                    <button onclick="add('tallas', 'l')" class="bg-zinc-800 px-3 py-1 rounded text-xs hover:bg-zinc-700">L</button>
                    <button onclick="add('tallas', 'xl')" class="bg-zinc-800 px-3 py-1 rounded text-xs hover:bg-zinc-700">XL</button>
                </div>
                <input type="text" id="tallas" class="w-full bg-zinc-950 border border-zinc-800 p-3 rounded-xl focus:border-indigo-500 outline-none lowercase">
            </div>

            <!-- Colores (con botones rápidos) -->
            <div class="md:col-span-2">
                <label class="block text-xs text-zinc-400 mb-1">Colores</label>
                <div class="flex gap-2 mb-2 flex-wrap">
                    <button onclick="add('colores', 'negro')" class="bg-zinc-800 px-3 py-1 rounded text-xs hover:bg-zinc-700">Negro</button>
                    <button onclick="add('colores', 'gris')" class="bg-zinc-800 px-3 py-1 rounded text-xs hover:bg-zinc-700">Gris</button>
                    <button onclick="add('colores', 'blanco')" class="bg-zinc-800 px-3 py-1 rounded text-xs hover:bg-zinc-700">Blanco</button>
                </div>
                <input type="text" id="colores" class="w-full bg-zinc-950 border border-zinc-800 p-3 rounded-xl focus:border-indigo-500 outline-none lowercase">
            </div>

            <div class="md:col-span-2">
                <label class="block text-xs text-zinc-400 mb-1">Descripción</label>
                <textarea id="desc" rows="3" class="w-full bg-zinc-950 border border-zinc-800 p-3 rounded-xl focus:border-indigo-500 outline-none lowercase"></textarea>
            </div>
            <div class="md:col-span-2">
                <label class="block text-xs text-zinc-400 mb-1">Imágenes</label>
                <input type="file" id="fotos" multiple accept="image/*" class="w-full bg-zinc-950 border border-zinc-800 p-3 rounded-xl text-sm">
            </div>
        </div>

        <button onclick="empaquetar()" class="w-full mt-6 bg-indigo-600 hover:bg-indigo-700 transition py-4 rounded-xl font-bold text-white shadow-lg">
            Generar Paquete (.zip)
        </button>
    </div>

    <script>
        // Función de Calculadora Matemática (Exactamente con tus reglas)
        function calcularCostos() {
            const usd = parseFloat(document.getElementById('calcUsd').value) || 0;
            const gramos = parseFloat(document.getElementById('calcGramos').value) || 0;

            // Regla de 3: 2000g = 35 USD (Envío) y 2000g = 3.2 USD (Ensayo)
            const envioUsd = (gramos / 2000) * 35;
            const ensayoUsd = (gramos / 2000) * 3.2;

            const subtotalUsd = usd + envioUsd + ensayoUsd;
            // + 4% de comisión (Kakobuy 3% + 1% de colchón)
            const totalUsdConComision = subtotalUsd * 1.04;
            // Dólar a 17.5 MXN
            const costoNetoMxn = totalUsdConComision * 17.5;

            // Mostrar en pantalla
            document.getElementById('resEnvio').innerText = `$${envioUsd.toFixed(2)}`;
            document.getElementById('resEnsayo').innerText = `$${ensayoUsd.toFixed(2)}`;
            document.getElementById('resTotalUsd').innerText = `$${totalUsdConComision.toFixed(2)}`;
            
            if(costoNetoMxn > 0) {
                document.getElementById('resMxn').innerText = `$${costoNetoMxn.toFixed(2)} MXN`;
            } else {
                document.getElementById('resMxn').innerText = `---`;
            }
        }

        // --- SISTEMA DE TURNOS Y CONSECUTIVOS (Aarón, Elías, Simao) ---
        function actualizarSugerencia() {
            const prefijo = document.getElementById('usuarioAdmin').value; // 0, 1 o 2
            const base = parseInt(prefijo) * 1000; // Aarón: 0, Elías: 1000, Simao: 2000
            
            // Buscar si ya guardaron uno antes en este celular
            const ultimoLocal = localStorage.getItem('lastCode_serie_' + prefijo);
            let sugerenciaNum = base; 

            if (ultimoLocal) {
                sugerenciaNum = parseInt(ultimoLocal) + 1; // Siguiente número
            }

            // Convertir a texto con ceros a la izquierda (ej: 0 -> 0000, 1 -> 0001)
            const sugerenciaTexto = sugerenciaNum.toString().padStart(4, '0');

            document.getElementById('labelUltimo').innerText = sugerenciaTexto;
            document.getElementById('codigo').value = sugerenciaTexto; 
        }

        // Ejecutar al cargar la página
        actualizarSugerencia();

        // Botones rápidos para agregar texto
        function add(id, val) {
            const input = document.getElementById(id);
            input.value = input.value ? input.value + ", " + val : val;
        }

        const formatoArray = (str) => JSON.stringify(str.split(',').map(s => s.trim().toLowerCase()).filter(s => s));

        async function empaquetar() {
            // El código lo sacamos de la caja de texto (ya trae los ceros si hace falta)
            const codigoString = document.getElementById('codigo').value.trim();
            const prefijo = document.getElementById('usuarioAdmin').value;
            
            const nombre = document.getElementById('nombre').value.toLowerCase();
            const marca = document.getElementById('marca').value.toLowerCase();
            const cat = formatoArray(document.getElementById('categoria').value);
            const pMen = document.getElementById('pMenudeo').value;
            const pMay = document.getElementById('pMayoreo').value;
            const pDist = document.getElementById('pDist').value;
            const tallas = formatoArray(document.getElementById('tallas').value);
            const colores = formatoArray(document.getElementById('colores').value);
            const desc = document.getElementById('desc').value.toLowerCase();
            const files = document.getElementById('fotos').files;
            
            if(!codigoString || files.length === 0) return alert("¡Faltan datos o fotos!");

            // Guardar el código numérico limpio para la próxima vez
            localStorage.setItem('lastCode_serie_' + prefijo, parseInt(codigoString));

            const zip = new JSZip();
            let rutas = [];

            for(let i = 0; i < files.length; i++) {
                const nombreArchivo = `${i + 100}.jpeg`; 
                zip.file(nombreArchivo, files[i]);
                rutas.push(`'productos/${marca}/${codigoString}/${nombreArchivo}'`);
            }

            const codigoJS = `{
    id: ${parseInt(codigoString)},
    codigo: "${codigoString}",
    nombre: "${nombre}",
    marca: "${marca}",
    categoria: ${cat},
    precioMenudeo: ${pMen},
    precioMayoreo: ${pMay},
    precioDistribuidor: ${pDist},
    tallas: ${tallas},
    colores: ${colores},
    descripcion: "${desc}",
    imagen: [
        ${rutas.join(',\n        ')}
    ]
},`;
            zip.file("codigo_para_pegar.txt", codigoJS);

            const contenido = await zip.generateAsync({type:"blob"});
            saveAs(contenido, `producto_${codigoString}.zip`);
            alert("¡Listo! Paquete generado.");
            location.reload(); 
        }
    </script>
</body>
</html>
