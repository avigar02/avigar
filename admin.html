<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Admin Avigars Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 p-4 md:p-10">

    <div class="max-w-3xl mx-auto bg-zinc-900 p-8 rounded-2xl border border-zinc-800 shadow-xl">
        <h2 class="text-2xl font-bold mb-6 text-white text-center">📦 Panel de Admin Avigar - V2</h2>
        
        <!-- SECCIÓN 1: DATOS BÁSICOS -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-xs text-zinc-400">Código</label>
                <input type="text" id="codigo" class="w-full bg-zinc-950 border border-zinc-800 p-3 rounded-xl font-bold text-center">
            </div>
            <div>
                <label class="block text-xs text-zinc-400">Nombre</label>
                <input type="text" id="nombre" class="w-full bg-zinc-950 border border-zinc-800 p-3 rounded-xl">
            </div>
        </div>

        <!-- CALCULADORA (SE QUEDA) -->
        <div class="bg-emerald-900/20 border border-emerald-500/30 rounded-xl p-4 my-6">
            <h3 class="text-emerald-400 font-bold mb-3 text-sm">🧮 Calculadora de Costos</h3>
            <div class="grid grid-cols-2 gap-4">
                <input type="number" id="calcUsd" oninput="calcularCostos()" placeholder="Costo USD" class="bg-zinc-950 border p-2 rounded">
                <input type="number" id="calcGramos" oninput="calcularCostos()" placeholder="Gramos" class="bg-zinc-950 border p-2 rounded">
            </div>
            <div class="mt-4 text-emerald-400 font-bold">COSTO NETO: <span id="resMxn">---</span></div>
        </div>

        <!-- SECCIÓN 2: TALLAS Y COLORES (SE QUEDA) -->
        <div class="space-y-4 my-6">
            <div>
                <label class="block text-xs text-zinc-400">Tallas</label>
                <div class="flex gap-2 mb-2">
                    <button onclick="add('tallas', 's')" class="bg-zinc-800 px-3 py-1 rounded text-xs">S</button>
                    <button onclick="add('tallas', 'm')" class="bg-zinc-800 px-3 py-1 rounded text-xs">M</button>
                    <button onclick="add('tallas', 'l')" class="bg-zinc-800 px-3 py-1 rounded text-xs">L</button>
                </div>
                <input type="text" id="tallas" class="w-full bg-zinc-950 border border-zinc-800 p-3 rounded-xl">
            </div>
        </div>

        <!-- SECCIÓN 3: IMÁGENES Y VINCULACIÓN (NUEVO Y FÁCIL) -->
        <div class="border-t border-zinc-800 pt-6">
            <label class="block text-xs text-zinc-400 mb-2">1. Sube todas las fotos (100.jpeg, 101.jpeg...)</label>
            <input type="file" id="fotos" multiple accept="image/*" class="w-full bg-zinc-950 border border-zinc-800 p-3 rounded-xl mb-4">
            
            <label class="block text-xs text-zinc-400 mb-2">2. Vincular fotos a colores (Ej: negro:100.jpeg, gris:101.jpeg)</label>
            <textarea id="vinculos" placeholder="negro:100.jpeg, gris:101.jpeg" class="w-full bg-zinc-950 border border-zinc-800 p-3 rounded-xl mb-4"></textarea>
            
            <label class="block text-xs text-zinc-400 mb-2">3. Subir foto de Guía de Tallas (Elige una única imagen)</label>
            <input type="file" id="fotoGuia" accept="image/*" class="w-full bg-zinc-950 border border-zinc-800 p-3 rounded-xl">
        </div>

        <button onclick="empaquetar()" class="w-full mt-8 bg-indigo-600 py-4 rounded-xl font-bold text-white hover:bg-indigo-700">
            Generar Paquete (.zip)
        </button>
    </div>

    <script>
        // Funciones de calculadora y add (mismas que tenías)
        function add(id, val) { const input = document.getElementById(id); input.value = input.value ? input.value + ", " + val : val; }
        
        function calcularCostos() { /* Mantén tu lógica original aquí */ }

        async function empaquetar() {
            const codigo = document.getElementById('codigo').value.trim();
            const marca = document.getElementById('marca').value || 'chrome-hearts';
            const vinculosRaw = document.getElementById('vinculos').value;
            const files = document.getElementById('fotos').files;
            const guiaFile = document.getElementById('fotoGuia').files[0];
            
            const zip = new JSZip();
            const folder = zip.folder(codigo);
            let rutas = [];

            // Procesar fotos normales
            for(let i = 0; i < files.length; i++) {
                const nombreArchivo = `${i + 100}.jpeg`;
                folder.file(nombreArchivo, files[i]);
                rutas.push(`'productos/${marca}/${codigo}/${nombreArchivo}'`);
            }

            // Procesar guía de tallas
            let guiaPath = "";
            if(guiaFile) {
                folder.file("guia.jpeg", guiaFile);
                guiaPath = `productos/${marca}/${codigo}/guia.jpeg`;
            }

            // Procesar variantes
            const variantes = vinculosRaw.split(',').map(item => {
                const [color, archivo] = item.split(':');
                return `{ nombre: "${color.trim().toLowerCase()}", imagen: "productos/${marca}/${codigo}/${archivo.trim()}" }`;
            }).join(',\n        ');

            const codigoJS = `{
    id: ${parseInt(codigo)},
    nombre: "${document.getElementById('nombre').value}",
    marca: "${marca}",
    tallas: ${JSON.stringify(document.getElementById('tallas').value.split(','))},
    imagen: [${rutas.join(',')}],
    variantes: [${variantes}],
    guiaTallas: "${guiaPath}"
},`;

            zip.file("codigo_para_pegar.txt", codigoJS);
            const blob = await zip.generateAsync({type:"blob"});
            saveAs(blob, `prod_${codigo}.zip`);
        }
    </script>
</body>
</html>
