<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Admin Avigars Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 p-4 md:p-10">

    <div class="max-w-2xl mx-auto bg-zinc-900 p-8 rounded-2xl border border-zinc-800 shadow-xl">
        <h2 class="text-2xl font-bold mb-6 text-white text-center">📦 Panel de Admin Avigar</h2>
        
        <div class="mb-6 p-4 bg-zinc-950 border border-zinc-800 rounded-xl">
            <label class="block text-sm font-bold text-indigo-400 mb-2">¿Quién está subiendo el producto?</label>
            <select id="usuarioAdmin" onchange="actualizarSugerencia()" class="w-full bg-zinc-900 border border-zinc-700 p-3 rounded-xl focus:border-indigo-500 outline-none text-white cursor-pointer">
                <option value="0">Aarón (Serie 0000)</option>
                <option value="1">Elías (Serie 1000)</option>
                <option value="2">Simao (Serie 2000)</option>
            </select>
        </div>

        <div class="bg-indigo-900/20 p-3 rounded-lg mb-6 border border-indigo-500/30 text-center flex items-center justify-between px-6">
            <p class="text-xs text-indigo-300">Siguiente código para esta serie:</p>
            <span id="labelUltimo" class="text-xl font-mono font-bold text-indigo-400">---</span>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-xs text-zinc-400 mb-1">Código</label>
                <input type="text" id="codigo" class="w-full bg-zinc-950 border border-zinc-800 p-3 rounded-xl outline-none text-lg font-bold text-center">
            </div>
            <div>
                <label class="block text-xs text-zinc-400 mb-1">Nombre (Ej: chamarra reversible...)</label>
                <input type="text" id="nombre" class="w-full bg-zinc-950 border border-zinc-800 p-3 rounded-xl outline-none lowercase">
            </div>
            <div>
                <label class="block text-xs text-zinc-400 mb-1">Marca (Ej: chrome-hearts)</label>
                <input type="text" id="marca" class="w-full bg-zinc-950 border border-zinc-800 p-3 rounded-xl outline-none lowercase">
            </div>
            <div>
                <label class="block text-xs text-zinc-400 mb-1">Categorías (Ej: chamarras, mezclilla)</label>
                <input type="text" id="categoria" class="w-full bg-zinc-950 border border-zinc-800 p-3 rounded-xl outline-none lowercase">
            </div>
            <div>
    <label class="block text-xs text-zinc-400 mb-1">Link del producto (Proveedor)</label>
    <input type="text" id="link" class="w-full bg-zinc-950 border border-zinc-800 p-3 rounded-xl outline-none">
</div>
            <!-- CALCULADORA ORIGINAL RESTAURADA -->
            <div class="md:col-span-2 bg-emerald-900/20 border border-emerald-500/30 rounded-xl p-4 my-2">
                <h3 class="text-emerald-400 font-bold mb-3 text-sm">🧮 Calculadora de Costo Real y Precios</h3>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-xs text-emerald-200/70 mb-1">Costo Pieza (USD)</label>
                        <input type="number" id="calcUsd" oninput="calcularCostos()" placeholder="Ej: 20" class="w-full bg-zinc-950 border border-emerald-900 p-2 rounded-lg focus:border-emerald-500 outline-none text-emerald-100">
                    </div>
                    <div>
                        <label class="block text-xs text-emerald-200/70 mb-1">Peso (Gramos reales)</label>
                        <input type="number" id="calcGramos" oninput="calcularCostos()" placeholder="Ej: 400" class="w-full bg-zinc-950 border border-emerald-900 p-2 rounded-lg focus:border-emerald-500 outline-none text-emerald-100">
                        <span id="pesoRedondeado" class="text-[10px] text-emerald-400/80 mt-1 block h-3"></span>
                    </div>
                </div>
                <!-- Resultados del cálculo -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-2 text-xs bg-zinc-950/50 p-3 rounded-lg border border-emerald-900/50">
                    <div class="text-center">
                        <span class="block text-zinc-500">Envío (USD)</span>
                        <span id="resEnvio" class="font-mono text-zinc-300">---</span>
                    </div>
                    <div class="text-center">
                        <span class="block text-zinc-500">Ensayo (USD)</span>
                        <span id="resEnsayo" class="font-mono text-zinc-300">---</span>
                    </div>
                    <div class="text-center">
                        <span class="block text-zinc-500">Total + 4%</span>
                        <span id="resTotalUsd" class="font-mono text-emerald-400">---</span>
                    </div>
                    <div class="text-center bg-emerald-500/10 rounded">
                        <span class="block text-emerald-500 font-bold">COSTO NETO</span>
                        <span id="resMxn" class="font-mono text-emerald-400 font-bold text-sm">---</span>
                    </div>
                </div>
            </div>

            <!-- PRECIOS -->
            <div>
                <label class="block text-xs text-indigo-300 mb-1 font-bold">Precio Menudeo</label>
                <input type="number" id="pMenudeo" class="w-full bg-indigo-950/30 border border-indigo-900/50 p-3 rounded-xl focus:border-indigo-500 outline-none text-indigo-100 font-bold">
            </div>
            <div>
                <label class="block text-xs text-indigo-300 mb-1 font-bold">Precio Mayoreo</label>
                <input type="number" id="pMayoreo" class="w-full bg-indigo-950/30 border border-indigo-900/50 p-3 rounded-xl focus:border-indigo-500 outline-none text-indigo-100 font-bold">
            </div>
            <div>
                <label class="block text-xs text-indigo-300 mb-1 font-bold">Precio Distribuidor</label>
                <input type="number" id="pDist" class="w-full bg-indigo-950/30 border border-indigo-900/50 p-3 rounded-xl focus:border-indigo-500 outline-none text-indigo-100 font-bold">
            </div>
            <div></div> 

            <!-- TALLAS ORIGINALES -->
            <div class="md:col-span-2 mt-2">
                <label class="block text-xs text-zinc-400 mb-1">Tallas</label>
                <div class="flex gap-2 mb-2">
                    <button onclick="add('tallas', 'xs')" class="bg-zinc-800 px-3 py-1 rounded text-xs hover:bg-zinc-700">XS</button>
                    <button onclick="add('tallas', 's')" class="bg-zinc-800 px-3 py-1 rounded text-xs hover:bg-zinc-700">S</button>
                    <button onclick="add('tallas', 'm')" class="bg-zinc-800 px-3 py-1 rounded text-xs hover:bg-zinc-700">M</button>
                    <button onclick="add('tallas', 'l')" class="bg-zinc-800 px-3 py-1 rounded text-xs hover:bg-zinc-700">L</button>
                    <button onclick="add('tallas', 'xl')" class="bg-zinc-800 px-3 py-1 rounded text-xs hover:bg-zinc-700">XL</button>
                    <button onclick="add('tallas', '2xl')" class="bg-zinc-800 px-3 py-1 rounded text-xs hover:bg-zinc-700">2XL</button>
                </div>
                <input type="text" id="tallas" class="w-full bg-zinc-950 border border-zinc-800 p-3 rounded-xl focus:border-indigo-500 outline-none lowercase">
            </div>

            <!-- COLORES ORIGINALES -->
            <div class="md:col-span-2">
                <label class="block text-xs text-zinc-400 mb-1">Colores</label>
                <div class="flex gap-2 mb-2 flex-wrap">
                    <button onclick="add('colores', 'negro')" class="bg-zinc-800 px-3 py-1 rounded text-xs hover:bg-zinc-700 border border-zinc-700/50">Negro</button>
                    <button onclick="add('colores', 'blanco')" class="bg-zinc-800 px-3 py-1 rounded text-xs hover:bg-zinc-700 border border-zinc-700/50">Blanco</button>
                    <button onclick="add('colores', 'gris')" class="bg-zinc-800 px-3 py-1 rounded text-xs hover:bg-zinc-700 border border-zinc-700/50">Gris</button>
                    <button onclick="add('colores', 'beige')" class="bg-zinc-800 px-3 py-1 rounded text-xs hover:bg-zinc-700 border border-zinc-700/50">Beige</button>
                    <button onclick="add('colores', 'azul')" class="bg-zinc-800 px-3 py-1 rounded text-xs hover:bg-zinc-700 border border-zinc-700/50">Azul</button>
                    <button onclick="add('colores', 'rojo')" class="bg-zinc-800 px-3 py-1 rounded text-xs hover:bg-zinc-700 border border-zinc-700/50">Rojo</button>
                    <button onclick="add('colores', 'verde')" class="bg-zinc-800 px-3 py-1 rounded text-xs hover:bg-zinc-700 border border-zinc-700/50">Verde</button>
                    <button onclick="add('colores', 'cafe')" class="bg-zinc-800 px-3 py-1 rounded text-xs hover:bg-zinc-700 border border-zinc-700/50">Café</button>
                    <button onclick="add('colores', 'amarillo')" class="bg-zinc-800 px-3 py-1 rounded text-xs hover:bg-zinc-700 border border-zinc-700/50">Amarillo</button>
                    <button onclick="add('colores', 'rosa')" class="bg-zinc-800 px-3 py-1 rounded text-xs hover:bg-zinc-700 border border-zinc-700/50">Rosa</button>
                    <button onclick="add('colores', 'morado')" class="bg-zinc-800 px-3 py-1 rounded text-xs hover:bg-zinc-700 border border-zinc-700/50">Morado</button>
                </div>
                <input type="text" id="colores" class="w-full bg-zinc-950 border border-zinc-800 p-3 rounded-xl focus:border-indigo-500 outline-none lowercase">
            </div>

            <div class="md:col-span-2">
                <label class="block text-xs text-zinc-400 mb-1">Descripción</label>
                <textarea id="desc" rows="3" class="w-full bg-zinc-950 border border-zinc-800 p-3 rounded-xl focus:border-indigo-500 outline-none lowercase"></textarea>
            </div>
            
            <!-- SECCIÓN DE SUBIDA DE IMÁGENES -->
            <div class="md:col-span-2 border-t border-zinc-800 pt-4 mt-2">
                <label class="block text-xs text-zinc-400 mb-1">1. Sube todas las fotos del producto (1.jpeg, 2.jpeg...)</label>
                <input type="file" id="fotos" multiple accept="image/*" class="w-full bg-zinc-950 border border-zinc-800 p-3 rounded-xl text-sm mb-4">
                
                <label class="block text-xs text-zinc-400 mb-1">2. Sube la foto de la Guía de Tallas (Se llamará guia.jpeg automáticamente)</label>
                <input type="file" id="guiaTallasFile" accept="image/*" class="w-full bg-zinc-950 border border-zinc-800 p-3 rounded-xl text-sm mb-4">
            </div>

            <!-- SECCIÓN: VINCULACIÓN DIDÁCTICA (SIEMPRE VISIBLE) -->
            <div class="md:col-span-2 border border-zinc-800 p-4 rounded-xl bg-zinc-950">
                <label class="block text-sm font-bold text-indigo-400 mb-2">3. Vincular Colores con Fotos</label>
                <p class="text-xs text-zinc-500 mb-4">Asegúrate de haber seleccionado colores y subido fotos arriba para ver los botones aquí.</p>
                
                <div id="botonesColores" class="flex gap-2 flex-wrap mb-4 items-center"></div>
                <div id="botonesFotos" class="flex gap-2 flex-wrap mb-4 items-center"></div>
                
                <div class="bg-zinc-900 p-3 rounded border border-zinc-800">
                    <span class="text-xs text-zinc-500 block mb-1">Parejas creadas:</span>
                    <div id="listaVinculos" class="flex gap-2 flex-wrap text-xs font-mono">Ninguna todavía...</div>
                </div>
            </div>
        </div>

        <button onclick="empaquetar()" class="w-full mt-6 bg-indigo-600 hover:bg-indigo-700 transition py-4 rounded-xl font-bold text-white shadow-lg">
            Generar Paquete (.zip)
        </button>
    </div>

    <script>
        // --- 1. TU CALCULADORA ORIGINAL ---
        function calcularCostos() {
            const usd = parseFloat(document.getElementById('calcUsd').value) || 0;
            const gramosRaw = parseFloat(document.getElementById('calcGramos').value) || 0;

            let gramosRedondeados = 0;
            if (gramosRaw > 0) {
                gramosRedondeados = Math.ceil(gramosRaw / 500) * 500;
                document.getElementById('pesoRedondeado').innerText = `Se calculará envío de: ${gramosRedondeados}g`;
            } else {
                document.getElementById('pesoRedondeado').innerText = '';
            }

            const envioUsd = (gramosRedondeados / 500) * 8.75;
            const ensayoUsd = (gramosRedondeados / 500) * 0.8;
            const subtotalUsd = usd + envioUsd + ensayoUsd;
            const totalUsdConComision = subtotalUsd * 1.04;
            const costoNetoMxn = totalUsdConComision * 17.5;

            document.getElementById('resEnvio').innerText = `$${envioUsd.toFixed(2)}`;
            document.getElementById('resEnsayo').innerText = `$${ensayoUsd.toFixed(2)}`;
            document.getElementById('resTotalUsd').innerText = `$${totalUsdConComision.toFixed(2)}`;
            
            if(costoNetoMxn > 0) {
                document.getElementById('resMxn').innerText = `$${costoNetoMxn.toFixed(2)} MXN`;

                // Aquí están tus precios desglosados originales
                let pMenRaw = costoNetoMxn * 1.5;
                const pMen = Math.ceil(pMenRaw / 10) * 10;
                let pMayRaw = pMen - 100;
                const pMay = Math.ceil(pMayRaw / 10) * 10;
                let pDisRaw = costoNetoMxn * (8/7);
                const pDis = Math.ceil(pDisRaw / 10) * 10;

                document.getElementById('pMenudeo').value = pMen;
                document.getElementById('pMayoreo').value = pMay;
                document.getElementById('pDist').value = pDis;

            } else {
                document.getElementById('resMxn').innerText = `---`;
                document.getElementById('pMenudeo').value = "";
                document.getElementById('pMayoreo').value = "";
                document.getElementById('pDist').value = "";
            }
        }

        // --- 2. SUGERENCIA DE CÓDIGO ---
        function actualizarSugerencia() {
            const prefijo = document.getElementById('usuarioAdmin').value; 
            const base = parseInt(prefijo) * 1000; 
            const ultimoLocal = localStorage.getItem('lastCode_serie_' + prefijo);
            let sugerenciaNum = base; 
            if (ultimoLocal) sugerenciaNum = parseInt(ultimoLocal) + 1; 
            
            const sugerenciaTexto = sugerenciaNum.toString().padStart(4, '0');
            document.getElementById('labelUltimo').innerText = sugerenciaTexto;
            document.getElementById('codigo').value = sugerenciaTexto; 
        }
        actualizarSugerencia();

        // --- 3. UTILIDADES ---
        function add(id, val) { 
            const input = document.getElementById(id); 
            input.value = input.value ? input.value + ", " + val : val;
            // Cuando le das clic a un color, actualizamos los botones automáticamente
            if(id === 'colores') generarBotonesVinculacion(); 
        }
        const formatoArray = (str) => JSON.stringify(str.split(',').map(s => s.trim().toLowerCase()).filter(s => s));

        // --- 4. LA LÓGICA VISUAL (CORREGIDA) ---
        let vinculosSeleccionados = {}; 
        let colorActivo = null;

        // Escucha cuando subas fotos o escribas manualmente colores
        document.getElementById('fotos').addEventListener('change', generarBotonesVinculacion);
        document.getElementById('colores').addEventListener('keyup', generarBotonesVinculacion);

        function generarBotonesVinculacion() {
            const fotosInput = document.getElementById('fotos');
            const coloresInput = document.getElementById('colores');
            const contColores = document.getElementById('botonesColores');
            const contFotos = document.getElementById('botonesFotos');

            // Limpiar área
            contColores.innerHTML = "";
            contFotos.innerHTML = "";

            const colores = coloresInput.value.split(',').map(c => c.trim()).filter(c => c);
            const numFotos = fotosInput.files.length;

            if(colores.length === 0 || numFotos === 0) return; // Si no hay fotos o colores, se detiene

            // Crear botones de colores (Paso A)
            contColores.innerHTML = '<span class="text-xs text-zinc-500 mr-2 uppercase">Paso A. Selecciona Color:</span>';
            colores.forEach(c => {
                const btn = document.createElement('button');
                btn.innerText = c;
                btn.className = "bg-zinc-800 border border-zinc-700 px-3 py-1.5 rounded text-xs font-bold hover:bg-emerald-600 transition-colors text-white";
                btn.onclick = (e) => { 
                    e.preventDefault(); 
                    colorActivo = c; 
                    // Resaltar el botón presionado
                    Array.from(contColores.children).forEach(b => {
                        if(b.tagName === 'BUTTON') b.className = "bg-zinc-800 border border-zinc-700 px-3 py-1.5 rounded text-xs font-bold hover:bg-emerald-600 text-white";
                    });
                    btn.className = "bg-emerald-600 text-white px-3 py-1.5 rounded text-xs font-bold ring-2 ring-emerald-400";
                };
                contColores.appendChild(btn);
            });

            // Crear botones de fotos (Paso B)
            contFotos.innerHTML = '<span class="text-xs text-zinc-500 mr-2 uppercase">Paso B. Asígnale Foto:</span>';
            for(let i = 1; i <= numFotos; i++) {
                const btn = document.createElement('button');
                btn.innerText = "Foto " + i;
                btn.className = "bg-zinc-800 border border-zinc-700 px-3 py-1.5 rounded text-xs font-bold hover:bg-indigo-600 transition-colors text-white";
                btn.onclick = (e) => {
                    e.preventDefault();
                    if(colorActivo) {
                        vinculosSeleccionados[colorActivo] = i; // Guardamos "gris": 2
                        actualizarLista();
                    } else { 
                        alert("¡Hey! Primero haz clic en uno de los colores arriba."); 
                    }
                };
                contFotos.appendChild(btn);
            }
        }

        function actualizarLista() {
            const cont = document.getElementById('listaVinculos');
            cont.innerHTML = "";
            for(let color in vinculosSeleccionados) {
                cont.innerHTML += `<span class="bg-emerald-900/30 text-emerald-400 border border-emerald-800 px-2 py-1 rounded">✅ ${color} ➔ Foto ${vinculosSeleccionados[color]}</span>`;
            }
        }

        // --- 5. EMPAQUETADOR ZIP ---
        async function empaquetar() {
            const codigoString = document.getElementById('codigo').value.trim();
            const marca = document.getElementById('marca').value.toLowerCase().trim() || "marca-desconocida";
            const files = document.getElementById('fotos').files;
            const guiaFile = document.getElementById('guiaTallasFile').files[0]; 
            
            if(!codigoString || files.length === 0) return alert("¡Faltan datos o subir las fotos!");
            
            localStorage.setItem('lastCode_serie_' + document.getElementById('usuarioAdmin').value, parseInt(codigoString));

            const zip = new JSZip();
            const carpetaFotos = zip.folder(codigoString);
            let rutas = [];
            
            // Guardar fotos principales
            for(let i = 0; i < files.length; i++) {
                const nombreArchivo = `${i + 1}.jpeg`; // Empiezan en 1.jpeg
                carpetaFotos.file(nombreArchivo, files[i]);
                rutas.push(`'productos/${codigoString}/${nombreArchivo}'`);
            }

            // Guardar guía de tallas
            let guiaPathText = "";
            if(guiaFile) {
                carpetaFotos.file("guia.jpeg", guiaFile);
                guiaPathText = `\n    guiaTallas: "productos/${codigoString}/guia.jpeg"`;
            }

            // Formatear las variantes
            const variantes = Object.keys(vinculosSeleccionados).map(color => {
                const numFoto = vinculosSeleccionados[color];
                return `{ nombre: "${color}", imagen: "productos/${codigoString}/${numFoto}.jpeg" }`;
            }).join(',\n        ');

            let variantesPathText = "";
            if (variantes.length > 0) {
                variantesPathText = `\n    variantes: [\n        ${variantes}\n    ],`;
            }

            const codigoJS = `{
    id: ${parseInt(codigoString)},
    codigo: "${codigoString}",
    nombre: "${document.getElementById('nombre').value.toLowerCase()}",
    marca: "${marca}",
    link: "${document.getElementById('link').value}",
    categoria: ${formatoArray(document.getElementById('categoria').value)},
    precioMenudeo: ${document.getElementById('pMenudeo').value || 0},
    precioMayoreo: ${document.getElementById('pMayoreo').value || 0},
    precioDistribuidor: ${document.getElementById('pDist').value || 0},
    tallas: ${formatoArray(document.getElementById('tallas').value)},
    colores: ${formatoArray(document.getElementById('colores').value)},
    descripcion: "${document.getElementById('desc').value.toLowerCase().replace(/\n/g, ' ')}",
    imagen: [\n        ${rutas.join(',\n        ')}\n    ],${variantesPathText}${guiaPathText}
},`;

            zip.file(`${codigoString}/codigo_para_pegar.txt`, codigoJS);
            const blob = await zip.generateAsync({type:"blob"});
            saveAs(blob, `producto_${codigoString}.zip`);
            alert("¡Listo! Paquete generado.");
            location.reload(); 
        }
    </script>
</body>
</html>
