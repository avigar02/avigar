<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Avigar - Paquetizador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <script>
        const CLAVE = "Avigar123"; // <--- CAMBIA ESTA CLAVE POR LA TUYA
        const password = prompt("Introduce la clave de administración:");
        if (password !== CLAVE) {
            alert("Acceso denegado");
            window.location.href = "https://google.com";
        }
    </script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full bg-zinc-900 p-8 rounded-2xl border border-zinc-800 shadow-2xl">
        <h2 class="text-2xl font-bold mb-6 text-center text-white">📦 Panel de Admin Avigar</h2>
        
        <div class="space-y-4">
            <div>
                <label class="block text-xs text-zinc-400 mb-1">Código del producto (Ej: 0005)</label>
                <input type="text" id="codigo" placeholder="0005" class="w-full bg-zinc-950 border border-zinc-800 p-3 rounded-xl focus:border-indigo-500 outline-none">
            </div>
            
            <div>
                <label class="block text-xs text-zinc-400 mb-1">Nombre del producto</label>
                <input type="text" id="nombre" placeholder="Chamarra..." class="w-full bg-zinc-950 border border-zinc-800 p-3 rounded-xl focus:border-indigo-500 outline-none">
            </div>
            
            <div>
                <label class="block text-xs text-zinc-400 mb-1">Precio Menudeo</label>
                <input type="number" id="precio" placeholder="1500" class="w-full bg-zinc-950 border border-zinc-800 p-3 rounded-xl focus:border-indigo-500 outline-none">
            </div>
            
            <div>
                <label class="block text-xs text-zinc-400 mb-1">Seleccionar fotos</label>
                <input type="file" id="fotos" multiple accept="image/*" class="w-full bg-zinc-950 border border-zinc-800 p-3 rounded-xl text-sm file:mr-4 file:rounded-full file:border-0 file:bg-indigo-600 file:text-white hover:file:bg-indigo-700">
            </div>

            <button onclick="empaquetar()" class="w-full bg-indigo-600 hover:bg-indigo-700 transition py-4 rounded-xl font-bold text-white shadow-lg mt-4">
                Generar y Descargar Paquete (.zip)
            </button>
        </div>
    </div>

    <script>
        async function empaquetar() {
            const codigo = document.getElementById('codigo').value;
            const nombre = document.getElementById('nombre').value;
            const precio = document.getElementById('precio').value;
            const files = document.getElementById('fotos').files;
            
            if(!codigo || files.length === 0) return alert("¡Faltan datos o fotos!");

            const zip = new JSZip();
            let rutas = [];

            // 1. Meter fotos al ZIP
            for(let i = 0; i < files.length; i++) {
                const nombreArchivo = `${i + 1}.jpeg`;
                zip.file(nombreArchivo, files[i]);
                rutas.push(`'productos/${codigo}/${nombreArchivo}'`);
            }

            // 2. Crear archivo de texto con el código
            const codigoJS = `{
    id: ${Date.now()},
    codigo: '${codigo}',
    nombre: '${nombre}',
    precioMenudeo: ${precio},
    imagen: [${rutas.join(', ')}]
},`;
            zip.file("codigo_para_pegar.txt", codigoJS);

            // 3. Descargar
            const contenido = await zip.generateAsync({type:"blob"});
            saveAs(contenido, `producto_${codigo}.zip`);
            alert("¡Paquete listo! Búscalo en tus descargas.");
        }
    </script>
</body>
</html>
