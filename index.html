            selectTalla.innerHTML = prod.tallas.map(t => `<option value="${t}">${t}</option>`).join('');

        function añadirAlCarrito() {
    if (!productoSeleccionadoActual) return;

    const tallaSeleccionada = document.getElementById('selector-talla').value;
    const colorSeleccionado = document.getElementById('selector-color').value;

    // VALIDACIÓN: Por si el cliente no elige talla
    if (!tallaSeleccionada || tallaSeleccionada === "") {
        alert("Por favor, selecciona una talla antes de agregar al carrito.");
        return;
    }

    // 1. Buscar si YA existe EXACTAMENTE ese mismo producto (por id del inventario, talla y color) en el carrito
    const productoExistente = carrito.find(item => 
        item.idBase === productoSeleccionadoActual.id && 
        item.talla === tallaSeleccionada && 
        item.color === colorSeleccionado
    );

    if (productoExistente) {
        // Si ya está en el carrito, SOLO le sumamos 1 a la cantidad de piezas
        productoExistente.cantidad += 1;
    } else {
        // Si NO existe, creamos el elemento agregándole la propiedad 'cantidad: 1'
        const item = {
            idUnico: Date.now(), // Sigue sirviendo para borrarlo individualmente
            idBase: productoSeleccionadoActual.id, // Guardamos el ID del inventario para comparar
            nombre: productoSeleccionadoActual.nombre,
            marca: productoSeleccionadoActual.marca,
            talla: tallaSeleccionada,
            color: colorSeleccionado,
            pMenudeo: productoSeleccionadoActual.precioMenudeo,
            pMayoreo: productoSeleccionadoActual.precioMayoreo,
            pDistribuidor: productoSeleccionadoActual.precioDistribuidor,
            cantidad: 1 // <--- Aquí empieza nuestro contador de piezas
        };
        carrito.push(item);
    }

    // Guardar y refrescar la pantalla del carrito
    localStorage.setItem("carritoAvigar", JSON.stringify(carrito));
    actualizarInterfazCarrito();
    cerrarModal();
    abrirCarrito();
}

                        <span class="text-[9px] bg-zinc-800 text-zinc-400 px-2 py-0.5 rounded uppercase font-bold tracking-wider">${prod.marca}</span>
                        <h3 class="font-bold text-xs text-zinc-100 mt-1.5 line-clamp-2 h-8">${prod.nombre}</h3>
                    </div>
                    
                    <div class="mt-2.5 flex flex-col gap-1">
                        <div class="flex justify-between items-baseline text-[11px]">
                            <span class="text-zinc-500">Menudeo:</span>
                            <span class="text-emerald-400 font-bold">$${prod.precioMenudeo.toLocaleString()}</span>
                        </div>
                        <div class="flex justify-between items-baseline text-[11px]">
                            <span class="text-zinc-500">Mayoreo:</span>
                            <span class="text-zinc-300 font-medium">$${prod.precioMayoreo.toLocaleString()}</span>

                        <div class="flex justify-between items-baseline text-[11px]">
                            <span class="text-zinc-500">Distribuidor:</span>

                <button onclick="abrirModal(${prod.id})" class="mt-3 w-full bg-zinc-100 hover:bg-zinc-200 text-black font-bold py-2 rounded-xl text-[11px] transition-colors" type="button">

    });
}

// === AQUÍ EN LA LÍNEA 360 LA PEGAS ===
function cambiarCantidadCarrito(idUnico, cambio) {
    const item = carrito.find(p => p.idUnico === idUnico);
    if (!item) return;

    item.cantidad += cambio;

    if (item.cantidad <= 0) {
        carrito = carrito.filter(p => p.idUnico !== idUnico);
    }

    localStorage.setItem("carritoAvigar", JSON.stringify(carrito));
    actualizarInterfazCarrito();
}

        function actualizarInterfazCarrito() {
            // Reemplaza la línea del contador para que sume las cantidades totales de piezas:
const totalPiezas = carrito.reduce((suma, item) => suma + item.cantidad, 0);
document.getElementById('carrito-contador').innerText = totalPiezas;
            const botonFlotante = document.getElementById('btn-carrito-flotante');
            const contenedorItems = document.getElementById('carrito-items');

            
            if(carrito.length > 0) {
                botonFlotante.classList.remove('hidden');
            } else {
                botonFlotante.classList.add('hidden');
                cerrarCarrito();
            }

            contenedorItems.innerHTML = "";
            let totMenudeo = 0, totMayoreo = 0, totDist = 0;

           carrito.forEach(item => {
    // 1. Multiplicamos cada precio por la cantidad de piezas de la variante
    totMenudeo += item.pMenudeo * item.cantidad;
    totMayoreo += item.pMayoreo * item.cantidad;
    totDist += item.pDistribuidor * item.cantidad;

    // 2. Agregamos el item al contenedorHTML incluyendo la cantidad
    // 2. Agregamos el item al contenedorHTML incluyendo la cantidad con los botones
    contenedorItems.innerHTML += `
        <div class="flex justify-between items-start bg-zinc-900/40 p-3 border border-zinc-950 rounded-xl text-xs">
            <div class="w-full">
                <h4 class="font-bold text-zinc-100">${item.nombre}</h4>
                <p class="text-zinc-500 uppercase text-[10px] mt-0.5">${item.marca} • Talla: <span class="text-zinc-300 font-semibold">${item.talla}</span> • Color: <span class="text-zinc-300 font-semibold">${item.color}</span></p>
                
                <div class="flex items-center gap-2 mt-2">
                    <span class="text-zinc-500 text-[11px]">Cantidad:</span>
                    <div class="flex items-center bg-zinc-950 border border-zinc-800 rounded-md overflow-hidden">
                        <button onclick="cambiarCantidadCarrito(${item.idUnico}, -1)" class="px-2 py-0.5 bg-zinc-900 hover:bg-zinc-800 text-zinc-300 text-[11px] font-bold transition" type="button">-</button>
                        <span class="px-2.5 text-emerald-400 font-bold text-[11px] min-w-[18px] text-center">${item.cantidad}</span>
                        <button onclick="cambiarCantidadCarrito(${item.idUnico}, 1)" class="px-2 py-0.5 bg-zinc-900 hover:bg-zinc-800 text-zinc-300 text-[11px] font-bold transition" type="button">+</button>
                    </div>
                </div>

                <div class="flex gap-3 text-zinc-400 text-[10px] mt-2.5">
                    <span>Men: $${(item.pMenudeo * item.cantidad).toLocaleString()}</span>
                    <span class="text-emerald-400">May: $${(item.pMayoreo * item.cantidad).toLocaleString()}</span>
                    <span class="text-indigo-400">Dist: $${(item.pDistribuidor * item.cantidad).toLocaleString()}</span>
                </div>
            </div>
            <button onclick="eliminarDelCarrito(${item.idUnico})" class="text-zinc-600 hover:text-red-400 text-sm font-bold pl-2">×</button>
        </div>
    `;
});

            document.getElementById('total-menudeo').innerText = `$${totMenudeo}`;
            document.getElementById('total-mayoreo').innerText = `$${totMayoreo}`;
            document.getElementById('total-distribuidor').innerText = `$${totDist}`;
        }

        function abrirCarrito() { document.getElementById('carrito-sidebar').classList.remove('hidden'); }
        function cerrarCarrito() { document.getElementById('carrito-sidebar').classList.add('hidden'); }

        function enviarPedidoWhatsApp() {
    if (carrito.length === 0) return;

    let textoMensaje = "*NUEVO PEDIDO DE COMPRA - AVIGAR*\n";
    textoMensaje += "──────────────────────────────────\n\n";

    let subMenudeo = 0, subMayoreo = 0, subDistribuidor = 0;

    carrito.forEach((item, index) => {
        subMenudeo += item.pMenudeo * item.cantidad;
        subMayoreo += item.pMayoreo * item.cantidad;
        subDistribuidor += item.pDistribuidor * item.cantidad;

        textoMensaje += `*${index + 1}.* ${item.nombre}\n`;
        textoMensaje += `    • Marca: ${item.marca.toUpperCase()}\n`;
        textoMensaje += `    • Talla: ${item.talla}\n`;
        textoMensaje += `    • Modelo/Color: ${item.color}\n`;
        textoMensaje += `    • Cantidad: *${item.cantidad} pza(s)*\n`;
        // === LÍNEA CORREGIDA CON DISTRIBUIDOR INCLUIDO ===
        textoMensaje += `    • Subtotal: (Men: $${(item.pMenudeo * item.cantidad).toLocaleString()} | May: $${(item.pMayoreo * item.cantidad).toLocaleString()} | Dist: $${(item.pDistribuidor * item.cantidad).toLocaleString()})\n\n`;
    });

    textoMensaje += "──────────────────────────────────\n";
    textoMensaje += "*SUBTOTALES SEGÚN TU VOLUMEN:*\n";
    textoMensaje += `* Total Menudeo (1 pza): *$${subMenudeo.toLocaleString()}*\n`;
    textoMensaje += `* Total Mayoreo (> $4k): *$${subMayoreo.toLocaleString()}*\n`;
    textoMensaje += `* Total Distribuidor (> $8k): *$${subDistribuidor.toLocaleString()}*\n\n`;
    textoMensaje += "_Quedo a la espera de los datos de depósito._";

    const linkFinal = `https://wa.me/${MI_WHATSAPP}?text=${encodeURIComponent(textoMensaje)}`;
    window.open(linkFinal, '_blank');
}

const observadorPantalla = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting) {
        paginaActual++;
        mostrarProductosPorBloque();
    }
}, {
    rootMargin: "0px 0px 300px 0px" // Carga el bloque de forma anticipada para mantener la fluidez
});

// Arrancar procesos principales al cargar el documento
document.addEventListener("DOMContentLoaded", () => {
    const centinela = document.getElementById('centinela-scroll');
    if (centinela) observadorPantalla.observe(centinela);

    // Ejecutamos tus filtros por primera vez para clonar el inventario inicial
    aplicarFiltrosCruzados();
});
