<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Mayorista | Streetwear</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #ffffff; }
        .titulo-urbano { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.05em; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="p-4 md:p-8 pb-24">

    <header class="text-center my-12 max-w-2xl mx-auto">
        <h1 class="titulo-urbano text-6xl md:text-8xl font-bold mb-4 tracking-wider text-white">AVIGAR</h1>
        <p class="text-gray-400 text-sm md:text-base tracking-wide uppercase">Catálogo de Importación • Bajo Pedido</p>
        
        <div class="mt-8 grid grid-cols-1 md:grid-cols-3 gap-4 border border-zinc-800 p-4 bg-zinc-900/50 rounded-lg">
            <div><p class="text-xs text-gray-500 uppercase">Nivel 1</p><p class="font-bold text-lg">Menudeo</p><p class="text-xs text-zinc-400">1 pza</p></div>
            <div class="border-y md:border-y-0 md:border-x border-zinc-800 py-2 md:py-0"><p class="text-xs text-emerald-400 uppercase">Nivel 2</p><p class="font-bold text-lg text-emerald-400">Mayoreo</p><p class="text-xs text-zinc-400">> $4,000</p></div>
            <div><p class="text-xs text-indigo-400 uppercase">Nivel 3</p><p class="font-bold text-lg text-indigo-400">Distribuidor</p><p class="text-xs text-zinc-400">> $8,000</p></div>
        </div>
    </header>

    <section class="flex flex-wrap justify-center gap-2 mb-12 max-w-xl mx-auto">
        <button onclick="filtrarProductos('todos')" class="bg-white text-black px-4 py-2 rounded-full font-semibold text-sm hover:opacity-90 transition">Todos</button>
        <button onclick="filtrarProductos('chrome hearts')" class="bg-zinc-900 border border-zinc-800 text-zinc-400 px-4 py-2 rounded-full font-semibold text-sm hover:text-white transition">Chrome Hearts</button>
        <button onclick="filtrarProductos('trapstar')" class="bg-zinc-900 border border-zinc-800 text-zinc-400 px-4 py-2 rounded-full font-semibold text-sm hover:text-white transition">Trapstar</button>
        <button onclick="filtrarProductos('chamarras')" class="bg-zinc-900 border border-zinc-800 text-zinc-400 px-4 py-2 rounded-full font-semibold text-sm hover:text-white transition">Chamarras</button>
    </section>

    <main class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 max-w-6xl mx-auto">
        </main>

    <div id="btn-carrito-flotante" onclick="abrirCarrito()" class="fixed bottom-6 right-6 bg-emerald-500 text-black font-bold px-6 py-4 rounded-full shadow-2xl flex items-center gap-3 cursor-pointer hover:bg-emerald-400 transition transform hover:scale-105 z-40 hidden">
        <span>🛒 Carrito</span>
        <span id="carrito-contador" class="bg-black text-white text-xs px-2 py-1 rounded-full">0</span>
    </div>

    <div id="carrito-sidebar" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 hidden flex justify-end">
        <div class="bg-zinc-950 w-full max-w-md h-full p-6 flex flex-col justify-between border-l border-zinc-800 shadow-2xl">
            <div>
                <div class="flex justify-between items-center pb-4 border-b border-zinc-900">
                    <h2 class="titulo-urbano text-3xl font-bold">Tu Pedido</h2>
                    <button onclick="cerrarCarrito()" class="text-zinc-400 hover:text-white text-xl">✕</button>
                </div>
                <div id="carrito-items" class="mt-4 space-y-4 overflow-y-auto max-h-[60vh] no-scrollbar"></div>
            </div>
            <div class="border-t border-zinc-900 pt-4 space-y-3">
                <div class="flex justify-between text-sm text-zinc-400"><span>Subtotal Menudeo:</span><span id="total-menudeo" class="text-white font-semibold"></span></div>
                <div class="flex justify-between text-sm text-emerald-400"><span>Subtotal Mayoreo:</span><span id="total-mayoreo" class="font-semibold"></span></div>
                <div class="flex justify-between text-base text-indigo-400 font-bold"><span>Subtotal Distribuidor:</span><span id="total-distribuidor"></span></div>
                
                <button onclick="enviarPedidoWhatsApp()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-black font-bold py-3 rounded-xl transition mt-2 text-sm">
                    Enviar Lista Completa por WhatsApp
                </button>
            </div>
        </div>
    </div>

    <div id="modal-detalle" class="fixed inset-0 bg-black/90 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-zinc-950 border border-zinc-800 w-full max-w-3xl rounded-2xl overflow-hidden max-h-[90vh] flex flex-col md:flex-row relative">
            <button onclick="cerrarModal()" class="absolute top-4 right-4 z-10 bg-black/60 text-white w-8 h-8 rounded-full flex items-center justify-center font-bold hover:bg-white hover:text-black transition">✕</button>
            
            <div class="w-full md:w-1/2 bg-zinc-900 flex flex-col justify-between p-4">
                <div class="aspect-square w-full rounded-xl overflow-hidden bg-zinc-950">
                    <img id="modal-foto-principal" src="" alt="" class="w-full h-full object-cover">
                </div>
                <div id="modal-miniaturas" class="flex gap-2 mt-3 overflow-x-auto no-scrollbar"></div>
            </div>

            <div class="w-full md:w-1/2 p-6 flex flex-col justify-between overflow-y-auto max-h-[50vh] md:max-h-none">
                <div>
                    <span id="modal-marca" class="text-[10px] bg-zinc-800 text-zinc-400 px-2 py-0.5 rounded uppercase font-semibold"></span>
                    <h2 id="modal-nombre" class="titulo-urbano text-3xl font-bold mt-2 text-white"></h2>
                    
                    <div class="my-3 p-3 bg-zinc-900/50 border border-zinc-900 rounded-xl space-y-0.5 text-xs">
                        <div class="flex justify-between text-zinc-400"><span>Menudeo:</span><span id="modal-p1" class="font-semibold text-white"></span></div>
                        <div class="flex justify-between text-emerald-400"><span>Mayoreo ($4k):</span><span id="modal-p2" class="font-semibold"></span></div>
                        <div class="flex justify-between text-indigo-400 font-bold"><span>Distribuidor ($8k):</span><span id="modal-p3"></span></div>
                    </div>

                    <div class="grid grid-cols-2 gap-3 my-4">
                        <div>
                            <label class="block text-[11px] font-bold uppercase text-zinc-500 mb-1">Talla</label>
                            <select id="selector-talla" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2 text-xs text-white focus:outline-none focus:border-zinc-500"></select>
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold uppercase text-zinc-500 mb-1">Color / Modelo</label>
                            <select id="selector-color" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2 text-xs text-white focus:outline-none focus:border-zinc-500"></select>
                        </div>
                    </div>

                    <div>
                        <h4 class="text-xs font-bold uppercase text-zinc-500 tracking-wider mb-1">Detalles</h4>
                        <p id="modal-descripcion" class="text-xs text-zinc-300 leading-relaxed"></p>
                    </div>
                </div>

                <div class="mt-4">
                    <button id="btn-agregar-carrito" class="block w-full text-center bg-emerald-500 hover:bg-emerald-400 text-black font-bold text-sm py-3 rounded-xl transition">
                        Añadir al Pedido
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // TU TELÉFONO DE WHATSAPP OFICIAL YA CONFIGURADO
        const MI_WHATSAPP = "525536387646"; 

        // INVENTARIO DE MUESTRA (Modifica aquí tus productos, tallas y colores)
        const productos = [
             {
                id: 1,
                nombre: "Chaqueta de mezclilla Chrome hearts 0002",
                marca: "chrome hearts",
                categoria: ["Chrome Hearts", "Chaqueta", "Mezclilla"],
                precioMenudeo: 1200,
                precioMayoreo: 1100,
                precioDistribuidor: 900,
                tallas: ["S", "M", "L", "XL"],
                colores: ["Mezclilla azul"],
                descripcion: "Chaqueta de mezclilla con 2 bolsas en el pecho. Botones con el diseño de la marca. Parches de piel con relieve y diseño de la marca. Costuras de excelente calidad, con etiquetas internas y externas de la marca y bolsa chrome hearts.",
                    imagen: [
            "productos/chrome-hearts/camisa-de-mezclilla-con-parches-de-cuero-cosidos-azul/101.jpg",
            "productos/chrome-hearts/camisa-de-mezclilla-con-parches-de-cuero-cosidos-azul/102.jpg",
            "productos/chrome-hearts/camisa-de-mezclilla-con-parches-de-cuero-cosidos-azul/103.jpg",
            "productos/chrome-hearts/camisa-de-mezclilla-con-parches-de-cuero-cosidos-azul/104.jpg",
            "productos/chrome-hearts/camisa-de-mezclilla-con-parches-de-cuero-cosidos-azul/105.jpg",
            "productos/chrome-hearts/camisa-de-mezclilla-con-parches-de-cuero-cosidos-azul/106.jpg",
            "productos/chrome-hearts/camisa-de-mezclilla-con-parches-de-cuero-cosidos-azul/107.jpg"
            
        ]
            },
             {
                id: 2,
                nombre: "Chaqueta de mezclilla Chrome hearts 0001",
                marca: "chrome hearts",
                categoria: ["Chrome Hearts", "Chaqueta", "Mezclilla"],
                precioMenudeo: 1200,
                precioMayoreo: 1100,
                precioDistribuidor: 900,
                tallas: ["S", "M", "L", "XL"],
                colores: ["Mezclilla negra"],
                descripcion: "Chaqueta de mezclilla con 2 bolsas en el pecho. Botones con el diseño de la marca. Parches de mezclilla con relieve y diseño de la marca. Costuras de excelente calidad, con etiquetas internas y externas de la marca y bolsa chrome hearts",
                    imagen: [
            "productos/chrome-hearts/camisa-de-mezclilla-chrome-hearts-negra-con-parche-bordado-de-mezclilla/100.jpg",
            "productos/chrome-hearts/camisa-de-mezclilla-chrome-hearts-negra-con-parche-bordado-de-mezclilla/114.jpg",
            "productos/chrome-hearts/camisa-de-mezclilla-chrome-hearts-negra-con-parche-bordado-de-mezclilla/101.jpg",
            "productos/chrome-hearts/camisa-de-mezclilla-chrome-hearts-negra-con-parche-bordado-de-mezclilla/102.jpg",
            "productos/chrome-hearts/camisa-de-mezclilla-chrome-hearts-negra-con-parche-bordado-de-mezclilla/103.jpg",
            "productos/chrome-hearts/camisa-de-mezclilla-chrome-hearts-negra-con-parche-bordado-de-mezclilla/104.jpg",
            "productos/chrome-hearts/camisa-de-mezclilla-chrome-hearts-negra-con-parche-bordado-de-mezclilla/105.jpg",
            "productos/chrome-hearts/camisa-de-mezclilla-chrome-hearts-negra-con-parche-bordado-de-mezclilla/106.jpg",
            "productos/chrome-hearts/camisa-de-mezclilla-chrome-hearts-negra-con-parche-bordado-de-mezclilla/107.jpg",
        ]
            },
        ];

        let carrito = JSON.parse(localStorage.getItem("carritoAvigar")) || [];
        actualizarInterfazCarrito();

// OJO: Como no veo en esta foto el nombre exacto de la función que dibuja el carrito en tu pantalla, 
// pon aquí abajo el nombre de la función que usas para actualizar visualmente el carrito.
// Ejemplo: actualizarInterfazCarrito();
        let productoSeleccionadoActual = null;
        const contenedor = document.querySelector('main');

        function renderizarProductos(lista) {
            contenedor.innerHTML = "";
            if(lista.length === 0) {
                contenedor.innerHTML = `<p class="col-span-full text-center text-zinc-500 my-12">No hay productos en esta sección.</p>`;
                return;
            }

            lista.forEach(producto => {
                const tarjeta = `
                    <div onclick="abrirModal(${producto.id})" class="bg-zinc-900/30 border border-zinc-900 rounded-xl overflow-hidden p-3 flex flex-col justify-between cursor-pointer hover:border-zinc-700 transition transform hover:-translate-y-0.5">
                        <div>
                            <div class="aspect-square bg-zinc-900 rounded-lg overflow-hidden mb-3">
                                <img src="${producto.imagen[0]}" alt="${producto.nombre}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/400x400/18181b/ffffff?text=Ver+Fotos'">
                            </div>
                            <span class="text-[10px] bg-zinc-800 text-zinc-400 px-2 py-0.5 rounded uppercase font-semibold">${producto.marca}</span>
                            <h3 class="font-semibold text-xs md:text-sm mt-1 text-zinc-200 line-clamp-2">${producto.nombre}</h3>
                        </div>
                        
                        <div class="mt-4 pt-3 border-t border-zinc-900/80">
                            <div class="flex justify-between text-[10px] text-zinc-500 mb-0.5"><span>Menudeo:</span><span class="text-zinc-300">$${producto.precioMenudeo}</span></div>
                            <div class="flex justify-between text-[10px] text-emerald-500/90 mb-0.5"><span>Mayoreo:</span><span>$${producto.precioMayoreo}</span></div>
                            <div class="flex justify-between text-xs text-indigo-400 font-bold"><span>Distr:</span><span>$${producto.precioDistribuidor}</span></div>
                            
                            <div class="block w-full text-center bg-zinc-900 text-zinc-300 font-bold text-[11px] py-2 mt-3 rounded-lg border border-zinc-800 group-hover:bg-zinc-800">
                                Ver detalles / Pedir
                            </div>
                        </div>
                    </div>
                `;
                contenedor.innerHTML += tarjeta;
            });
        }

        function filtrarProductos(criterio) {
            if (criterio === 'todos') {
                renderizarProductos(productos);
            } else {
                const filtrados = productos.filter(p => p.marca === criterio || (Array.isArray(p.categoria) ? p.categoria.includes(criterio) : p.categoria === criterio));
                renderizarProductos(filtrados);
            }
        }

        const modal = document.getElementById('modal-detalle');
        
        function abrirModal(id) {
            const prod = productos.find(p => p.id === id);
            if(!prod) return;
            productoSeleccionadoActual = prod;

            document.getElementById('modal-nombre').innerText = prod.nombre;
            document.getElementById('modal-marca').innerText = prod.marca;
            document.getElementById('modal-descripcion').innerText = prod.descripcion;
            document.getElementById('modal-p1').innerText = `$${prod.precioMenudeo}`;
            document.getElementById('modal-p2').innerText = `$${prod.precioMayoreo}`;
            document.getElementById('modal-p3').innerText = `$${prod.precioDistribuidor}`;
            
            const selectTalla = document.getElementById('selector-talla');
            selectTalla.innerHTML = prod.tallas.map(t => `<option value="${t}">${t}</option>`).join('');

            const selectColor = document.getElementById('selector-color');
            selectColor.innerHTML = prod.colores.map(c => `<option value="${c}">${c}</option>`).join('');

            const fotoPrincipal = document.getElementById('modal-foto-principal');
            fotoPrincipal.src = prod.imagen[0];

            const contenedorMinis = document.getElementById('modal-miniaturas');
            contenedorMinis.innerHTML = "";
            prod.imagen.forEach((imgUrl, index) => {
                const mini = document.createElement('img');
                mini.src = imgUrl;
                mini.className = `w-14 h-14 object-cover rounded-lg border-2 cursor-pointer transition ${index === 0 ? 'border-white' : 'border-transparent'}`;
                mini.onclick = () => {
                    fotoPrincipal.src = imgUrl;
                    Array.from(contenedorMinis.children).forEach(c => c.classList.replace('border-white', 'border-transparent'));
                    mini.classList.replace('border-transparent', 'border-white');
                };
                contenedorMinis.appendChild(mini);
            });

            document.getElementById('btn-agregar-carrito').onclick = añadirAlCarrito;
            modal.classList.remove('hidden');
        }

        function cerrarModal() {
            modal.classList.add('hidden');
            productoSeleccionadoActual = null;
        }

        function añadirAlCarrito() {
            if(!productoSeleccionadoActual) return;

            const tallaSeleccionada = document.getElementById('selector-talla').value;
            const colorSeleccionado = document.getElementById('selector-color').value;

            const item = {
                idUnico: Date.now(),
                nombre: productoSeleccionadoActual.nombre,
                marca: productoSeleccionadoActual.marca,
                talla: tallaSeleccionada,
                color: colorSeleccionado,
                pMenudeo: productoSeleccionadoActual.precioMenudeo,
                pMayoreo: productoSeleccionadoActual.precioMayoreo,
                pDistribuidor: productoSeleccionadoActual.precioDistribuidor
            };

            carrito.push(item);
            localStorage.setItem("carritoAvigar", JSON.stringify(carrito));
            actualizarInterfazCarrito();
            cerrarModal();
            abrirCarrito();
        }

        function eliminarDelCarrito(idUnico) {
            carrito = carrito.filter(item => item.idUnico !== idUnico);
            actualizarInterfazCarrito();
        }

        function actualizarInterfazCarrito() {
            const contador = document.getElementById('carrito-contador');
            const botonFlotante = document.getElementById('btn-carrito-flotante');
            const contenedorItems = document.getElementById('carrito-items');

            contador.innerText = carrito.length;
            if(carrito.length > 0) {
                botonFlotante.classList.remove('hidden');
            } else {
                botonFlotante.classList.add('hidden');
                cerrarCarrito();
            }

            contenedorItems.innerHTML = "";
            let totMenudeo = 0, totMayoreo = 0, totDist = 0;

            carrito.forEach(item => {
                totMenudeo += item.pMenudeo;
                totMayoreo += item.pMayoreo;
                totDist += item.pDistribuidor;

                contenedorItems.innerHTML += `
                    <div class="flex justify-between items-start bg-zinc-900/40 p-3 border border-zinc-950 rounded-xl text-xs">
                        <div>
                            <h4 class="font-bold text-zinc-100">${item.nombre}</h4>
                            <p class="text-zinc-500 uppercase text-[10px] mt-0.5">${item.marca} • Talla: <span class="text-zinc-300 font-semibold">${item.talla}</span> • Modelo: <span class="text-zinc-300 font-semibold">${item.color}</span></p>
                            <div class="flex gap-3 text-zinc-400 text-[10px] mt-2">
                                <span>Men: $${item.pMenudeo}</span>
                                <span class="text-emerald-400">May: $${item.pMayoreo}</span>
                                <span class="text-indigo-400">Dist: $${item.pDistribuidor}</span>
                            </div>
                        </div>
                        <button onclick="eliminarDelCarrito(${item.idUnico})" class="text-zinc-600 hover:text-red-400 text-sm font-bold pl-2">✕</button>
                    </div>
                `;
            });

            document.getElementById('total-menudeo').innerText = `$${totMenudeo}`;
            document.getElementById('total-mayoreo').innerText = `$${totMayoreo}`;
            document.getElementById('total-distribuidor').innerText = `$${totDist}`;
        }

        function abrirCarrito() { document.getElementById('carrito-sidebar').classList.remove('hidden'); }
        function cerrarCarrito() { document.getElementById('carrito-sidebar').classList.add('hidden'); }

        function enviarPedidoWhatsApp() {
            if(carrito.length === 0) return;

            let textoMensaje = `*NUEVO PEDIDO DE COMPRA - AVIGAR*\n`;
            textoMensaje += `-------------------------------------\n\n`;

            let subMenudeo = 0, subMayoreo = 0, subDistribuidor = 0;

            carrito.forEach((item, index) => {
                subMenudeo += item.pMenudeo;
                subMayoreo += item.pMayoreo;
                subDistribuidor += item.pDistribuidor;

                textoMensaje += `*${index + 1}. ${item.nombre}*\n`;
                textoMensaje += `   • Marca: ${item.marca.toUpperCase()}\n`;
                textoMensaje += `   • Talla: ${item.talla}\n`;
                textoMensaje += `   • Modelo: ${item.color}\n`;
                textoMensaje += `   • Precios pza: (Men: $${item.pMenudeo} | May: $${item.pMayoreo} | Dist: $${item.pDistribuidor})\n\n`;
            });

            textoMensaje += `-------------------------------------\n`;
            textoMensaje += `*SUBTOTALES SEGÚN TU VOLUMEN:*\n`;
            textoMensaje += `Total Menudeo (1 pza): *$${subMenudeo}*\n`;
            textoMensaje += `Total Mayoreo (> $4k): *$${subMayoreo}*\n`;
            textoMensaje += `Total Distribuidor (> $8k): *$${subDistribuidor}*\n\n`;
            textoMensaje += `_Quedo a la espera de los datos de depósito._`;

            const linkFinal = `https://wa.me/${MI_WHATSAPP}?text=${encodeURIComponent(textoMensaje)}`;
            window.open(linkFinal, '_blank');
            carrito = [];
    localStorage.removeItem("carritoAvigar");
    actualizarInterfazCarrito();
        }

        renderizarProductos(productos);
    </script>
</body>
</html>
